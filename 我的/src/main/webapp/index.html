<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BUPT TA Recruitment System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f6f8; color: #2f3d4a; }
        .container { width: min(800px, 96%); margin: 0 auto; padding: 80px 0; text-align: center; }
        h1 { margin: 0 0 16px; font-size: 2.5rem; color: #1a2a4f; }
        p { margin: 0 0 32px; font-size: 1.1rem; color: #55606c; }
        .btn-container { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
        .btn { padding: 14px 24px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s ease; text-decoration: none; display: inline-block; }
        .btn-primary { background: #1c6ff1; color: #fff; }
        .btn-primary:hover { background: #144fc1; }
        .btn-secondary { background: #fff; color: #1c6ff1; border: 1px solid #1c6ff1; }
        .btn-secondary:hover { background: #f0f5ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BUPT TA Recruitment System</h1>
        <p>北京邮电大学助教招聘系统</p>
        <div class="btn-container">
            <a href="login.html" class="btn btn-primary">登录</a>
            <a href="register.html" class="btn btn-secondary">注册</a>
            <a href="admin_login.html" class="btn btn-secondary">管理员登录</a>
        </div>
    </div>
    <div style="text-align: center; margin-top: 40px; padding: 20px; font-size: 0.9rem; color: #6c757d;">
        <a href="privacy.html" style="color: #1c6ff1; text-decoration: none; margin: 0 10px;">隐私政策</a>
        <a href="ethics.html" style="color: #1c6ff1; text-decoration: none; margin: 0 10px;">伦理规范</a>
    </div>
</body>
</html>
