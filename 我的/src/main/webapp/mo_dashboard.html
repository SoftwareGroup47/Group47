<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MO Dashboard - BUPT TA Recruitment System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f6f8; color: #2f3d4a; }
        .container { width: min(800px, 96%); margin: 0 auto; padding: 40px 0; }
        h1 { margin: 0 0 24px; font-size: 1.8rem; color: #1a2a4f; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header h1 { margin: 0; }
        .btn { padding: 8px 16px; background: #1c6ff1; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s ease; text-decoration: none; display: inline-block; }
        .btn:hover { background: #144fc1; }
        .btn-group { display: flex; gap: 10px; }
        .application-list { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 10px 30px rgba(35, 70, 120, 0.1); }
        .application-item { padding: 16px; border-bottom: 1px solid #e6e9ed; }
        .application-item:last-child { border-bottom: none; }
        .application-title { font-size: 1.2rem; font-weight: 600; color: #1a2a4f; margin: 0 0 8px; }
        .application-meta { font-size: 0.9rem; color: #8a94a6; margin: 0 0 8px; }
        .application-status { font-size: 0.9rem; font-weight: 600; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .status-pending { background: #f39c12; color: #fff; }
        .status-approved { background: #27ae60; color: #fff; }
        .status-rejected { background: #e74c3c; color: #fff; }
        .action-buttons { margin-top: 10px; display: flex; gap: 10px; }
        .btn-approve { background: #27ae60; }
        .btn-reject { background: #e74c3c; }
        .btn-approve:hover { background: #219a52; }
        .btn-reject:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MO Dashboard</h1>
            <div class="btn-group">
                <a href="mo_post_job.html" class="btn">发布岗位</a>
                <a href="index.html" class="btn">退出登录</a>
            </div>
        </div>
        <div class="application-list">
            <h2>申请列表</h2>
            <div id="applicationList">
                <!-- 申请列表将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/fileUpload.js"></script>
    <script>
        // 检查用户是否登录
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'MO') {
            window.location.href = 'login.html';
        }
        
        // 加载申请列表
        function loadApplications() {
            const applications = Storage.getApplications();
            const applicationList = document.getElementById('applicationList');
            
            if (applications.length === 0) {
                applicationList.innerHTML = '<p>暂无申请</p>';
                return;
            }
            
            let html = '';
            applications.forEach(application => {
                // 查找申请人信息
                const applicant = Storage.findUserByUsername(application.applicantName);
                const skills = applicant ? (applicant.skills || '无') : '无';
                const grades = applicant ? (applicant.grades || '无') : '无';
                const cvPath = applicant ? (applicant.cvPath || '无') : '无';
                
                html += `
                    <div class="application-item">
                        <h3 class="application-title">${application.jobTitle}</h3>
                        <p class="application-meta">申请人: ${application.applicantName}</p>
                        <p class="application-meta">申请时间: ${application.applicationDate}</p>
                        <p class="application-meta">技能: ${skills}</p>
                        <p class="application-meta">成绩: ${grades}</p>
                        <span class="application-status status-${application.status.toLowerCase()}">${application.status}</span>
                        <div class="action-buttons">
                            <button class="btn btn-view-profile" data-username="${application.applicantName}">查看全部信息</button>
                            ${applicant && applicant.cvFileId ? `<button class="btn btn-view-resume" data-fileid="${applicant.cvFileId}">查看简历</button>` : ''}
                            ${application.status === 'Pending' ? `
                            <button class="btn btn-approve" data-id="${application.id}">通过</button>
                            <button class="btn btn-reject" data-id="${application.id}">拒绝</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            
            applicationList.innerHTML = html;
            
            // 添加审核按钮事件
            document.querySelectorAll('.btn-approve').forEach(btn => {
                btn.addEventListener('click', function() {
                    const applicationId = this.getAttribute('data-id');
                    updateApplicationStatus(applicationId, 'Approved');
                });
            });
            
            document.querySelectorAll('.btn-reject').forEach(btn => {
                btn.addEventListener('click', function() {
                    const applicationId = this.getAttribute('data-id');
                    updateApplicationStatus(applicationId, 'Rejected');
                });
            });
            
            // 添加查看全部信息按钮事件
            document.querySelectorAll('.btn-view-profile').forEach(btn => {
                btn.addEventListener('click', function() {
                    const username = this.getAttribute('data-username');
                    // 跳转到个人信息详情页面
                    window.location.href = `mo_view_profile.html?username=${username}`;
                });
            });
            
            // 添加查看简历按钮事件
            document.querySelectorAll('.btn-view-resume').forEach(btn => {
                btn.addEventListener('click', function() {
                    const fileId = this.getAttribute('data-fileid');
                    const fileUrl = FileUpload.getFileUrl(fileId);
                    if (fileUrl) {
                        window.open(fileUrl, '_blank');
                    } else {
                        alert('无法获取简历文件');
                    }
                });
            });
        }
        
        // 更新申请状态
        function updateApplicationStatus(applicationId, status) {
            const success = Storage.updateApplicationStatus(applicationId, status);
            if (success) {
                // 重新加载申请列表
                loadApplications();
            } else {
                alert('更新状态失败，请重试');
            }
        }
        
        // 加载申请列表
        loadApplications();
    </script>
</body>
</html>
