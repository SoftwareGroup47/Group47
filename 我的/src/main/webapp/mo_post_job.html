<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>发布岗位 - BUPT TA Recruitment System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f6f8; color: #2f3d4a; }
        .container { width: min(600px, 96%); margin: 0 auto; padding: 40px 0; }
        .post-job-box { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 10px 30px rgba(35, 70, 120, 0.1); }
        h1 { margin: 0 0 24px; font-size: 1.8rem; color: #1a2a4f; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #4f5f73; }
        input, select, textarea { width: 100%; padding: 12px 16px; border: 1px solid #cbd3db; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #1c6ff1; box-shadow: 0 0 0 3px rgba(28, 111, 241, 0.1); }
        textarea { resize: vertical; min-height: 100px; }
        .btn { width: 100%; padding: 14px; background: #1c6ff1; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s ease; }
        .btn:hover { background: #144fc1; }
        .back-link { margin-top: 20px; text-align: center; }
        .back-link a { color: #1c6ff1; text-decoration: none; font-weight: 600; }
        .back-link a:hover { text-decoration: underline; }
        .error-message { color: #e74c3c; margin-top: 10px; text-align: center; }
        .success-message { color: #27ae60; margin-top: 10px; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header h1 { margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>发布岗位</h1>
            <a href="mo_dashboard.html" class="btn">返回仪表盘</a>
        </div>
        <div class="post-job-box">
            <form id="postJobForm">
                <div class="form-group">
                    <label for="moduleCode">模块代码</label>
                    <input type="text" id="moduleCode" name="moduleCode" required>
                </div>
                <div class="form-group">
                    <label for="title">岗位标题</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="description">岗位描述</label>
                    <textarea id="description" name="description" required></textarea>
                </div>
                <div class="form-group">
                    <label for="capacity">招聘人数</label>
                    <input type="number" id="capacity" name="capacity" min="1" required>
                </div>
                <div class="form-group">
                    <label for="publisher">发布者</label>
                    <input type="text" id="publisher" name="publisher" required>
                </div>
                <button type="submit" class="btn">发布岗位</button>
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>
            </form>
        </div>
    </div>
    <script src="js/storage.js"></script>
    <script>
        // 检查用户是否登录且为MO角色
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'MO') {
            window.location.href = 'login.html';
        }
        
        document.getElementById('postJobForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const moduleCode = document.getElementById('moduleCode').value;
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const capacity = parseInt(document.getElementById('capacity').value);
            const publisher = document.getElementById('publisher').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // 验证表单数据
            if (!moduleCode || !title || !description || !capacity || !publisher) {
                errorMessage.textContent = '请填写所有必填字段';
                successMessage.textContent = '';
                return;
            }
            
            // 创建新岗位
            const newJob = {
                id: Date.now().toString(),
                moduleCode: moduleCode,
                title: title,
                description: description,
                capacity: capacity,
                publisher: publisher,
                status: 'Open'
            };
            
            // 保存岗位
            Storage.addJob(newJob);
            
            // 显示成功消息
            errorMessage.textContent = '';
            successMessage.textContent = '岗位发布成功！';
            
            // 清空表单
            document.getElementById('postJobForm').reset();
        });
    </script>
</body>
</html>
